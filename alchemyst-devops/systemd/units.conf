# ============================================================
# systemd/iii-engine.service  — place on api-vm
# ============================================================
[Unit]
Description=iii Distributed Worker Engine
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=root
WorkingDirectory=/opt/iii
ExecStart=/usr/local/bin/iii start --config /opt/iii/config.yaml
Restart=on-failure
RestartSec=5
StandardOutput=journal
StandardError=journal
Environment=PATH=/usr/local/bin:/usr/bin:/bin

[Install]
WantedBy=multi-user.target


# ============================================================
# systemd/caller-worker.service  — place on caller-vm
# Edit III_URL to match api-vm's internal IP.
# ============================================================
[Unit]
Description=iii Caller Worker (TypeScript)
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=root
WorkingDirectory=/opt/caller-worker
ExecStart=/usr/bin/npx tsx src/worker.ts
Restart=on-failure
RestartSec=10
StandardOutput=journal
StandardError=journal
Environment=III_URL=ws://10.0.0.x:49134
Environment=PATH=/usr/local/bin:/usr/bin:/bin

[Install]
WantedBy=multi-user.target


# ============================================================
# systemd/inference-worker.service  — place on inference-vm
# Edit III_URL to match api-vm's internal IP.
# ============================================================
[Unit]
Description=iii Inference Worker (Python / GGUF)
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=root
WorkingDirectory=/opt/inference-worker
ExecStart=/opt/inference-worker/.venv/bin/python inference_worker.py
Restart=on-failure
RestartSec=15
TimeoutStartSec=300
StandardOutput=journal
StandardError=journal
Environment=III_URL=ws://10.0.0.x:49134
Environment=HF_HOME=/opt/inference-worker/.cache/huggingface
Environment=PATH=/opt/inference-worker/.venv/bin:/usr/local/bin:/usr/bin:/bin

[Install]
WantedBy=multi-user.target
