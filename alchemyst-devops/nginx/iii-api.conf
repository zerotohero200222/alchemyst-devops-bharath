# /etc/nginx/sites-available/iii-api
# Proxies public HTTP traffic to the iii-http service on localhost:3111.
# Deploy on api-vm only.

server {
    listen 80 default_server;
    server_name _;

    # Optional: add a health-check endpoint that doesn't hit the model.
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass         http://127.0.0.1:3111;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade if iii-http uses it.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

        # Model inference can take a while; don't cut it off too soon.
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # Allow larger request bodies (long conversations).
        client_max_body_size  10M;
    }
}
