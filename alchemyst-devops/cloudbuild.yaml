substitutions:
  _REGION: "us-central1"
  _ENV: "dev"

options:
  logging: CLOUD_LOGGING_ONLY

steps:

# Terraform Init
- id: "tf-init"
  name: "hashicorp/terraform:1.6"
  entrypoint: "terraform"
  args:
    - init
    - -input=false
  dir: "terraform"

# Terraform Validate
- id: "tf-validate"
  name: "hashicorp/terraform:1.6"
  waitFor: ["tf-init"]
  entrypoint: "terraform"
  args:
    - validate
  dir: "terraform"

# Terraform Plan
- id: "tf-plan"
  name: "hashicorp/terraform:1.6"
  waitFor: ["tf-validate"]
  entrypoint: "terraform"
  args:
    - plan
    - -out=tfplan
    - -input=false
  dir: "terraform"

# Terraform Apply
- id: "tf-apply"
  name: "hashicorp/terraform:1.6"
  waitFor: ["tf-plan"]
  timeout: "2400s"
  entrypoint: "terraform"
  args:
    - apply
    - -auto-approve
    - tfplan
  dir: "terraform"

# Smoke Test
- id: "smoke-test"
  name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
  waitFor: ["tf-apply"]
  entrypoint: "sh"
  args:
    - "-c"
    - |
      apt-get update
      apt-get install -y curl

      echo "Fetching API IP..."

      API_IP=$(terraform -chdir=terraform output -raw api_public_ip)

      echo "API IP: $API_IP"

      sleep 90

      curl http://$API_IP/healthz || exit 1

      echo "Deployment Successful"

timeout: "3600s"